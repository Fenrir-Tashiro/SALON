version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env.example
    depends_on:
      couchdb:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app

  couchdb:
    image: couchdb:3.3
    ports:
      - '5984:5984'
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    volumes:
      - couchdb_data:/opt/couchdb/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5984/_up']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  couchdb_data:
